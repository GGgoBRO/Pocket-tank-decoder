<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PTD Tool</title>

<!-- Added JSZip Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding-top: 60px;
  }

  h2 {
    margin-bottom: 20px;
  }

  input {
    margin: 10px;
  }

  button, select {
    padding: 12px 20px;
    margin: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  button {
    background: #1e293b;
    color: white;
  }

  button:hover {
    background: #334155;
  }

  select {
    background: #1e293b;
    color: white;
  }

  #status {
    margin-top: 20px;
    color: #94a3b8;
    font-size: 14px;
    white-space: pre-line;
  }
</style>
</head>

<body>

<h2>PTD Encode / Decode Tool</h2>

<input type="file" id="fileInput" multiple><br>

<button onclick="processAll('decode')">Decode to .bin (Batch Zip)</button>

<br>

<select id="ext">
  <option value=".wep">.wep</option>
  <option value=".wea">.wea</option>
  <option value=".emit">.emit</option>
  <option value=".dat">.dat</option>
</select>

<button onclick="processAll('encode')">Encode to selected (Batch Zip)</button>

<div id="status"></div>

<script>
async function processAll(mode) {
  const fileInput = document.getElementById("fileInput");
  const files = fileInput.files;
  const statusDiv = document.getElementById("status");

  if (files.length === 0) return alert("Select one or more files first.");

  const zip = new JSZip();
  statusDiv.innerText = `Processing ${files.length} file(s)...`;

  for (let i = 0; i < files.length; i++) {
    statusDiv.innerText = `Processing (${i + 1}/${files.length}): ${files[i].name}`;
    
    // Process the file and get the result
    const result = await processFile(files[i], mode);
    
    // Add to zip: zip.file(filename, data)
    zip.file(result.name, result.data);
  }

  statusDiv.innerText = "Generating ZIP archive...";

  // Generate the zip file
  const content = await zip.generateAsync({ type: "blob" });
  
  // Trigger download
  const date = new Date().getTime();
  const zipName = `PTD_Batch_${date}.zip`;
  
  const url = URL.createObjectURL(content);
  const a = document.createElement("a");
  a.href = url;
  a.download = zipName;
  a.click();

  statusDiv.innerText = `Done! Downloaded: ${zipName}`;
  
  // Cleanup
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function processFile(file, mode) {
  return new Promise((resolve) => {
    const reader = new FileReader();

    reader.onload = function(e) {
      let data = new Uint8Array(e.target.result);

      if (mode === "decode") {
        swapBlocks(data);
        xorTransform(data);
      } else {
        xorTransform(data);
        swapBlocks(data);
      }

      let name = file.name;
      let newName;

      if (mode === "decode") {
        newName = name.replace(/\.[^/.]+$/, "") + ".bin";
      } else {
        let ext = document.getElementById("ext").value;
        newName = name.replace(/\.[^/.]+$/, "") + ext;
      }

      // Return the data instead of downloading directly
      resolve({ name: newName, data: data });
    };

    reader.readAsArrayBuffer(file);
  });
}

function xorTransform(data) {
  let mask = 0x03;
  for (let i = 0; i < data.length; i++) {
    data[i] ^= mask;
    mask ^= 0x1B;
  }
}

function swapBlocks(data) {
  for (let i = 0; i + 15 < data.length; i += 16) {
    swap(data, i + 0, i + 8);
    swap(data, i + 1, i + 9);
    swap(data, i + 5, i + 13);
    swap(data, i + 6, i + 14);
  }
}

function swap(arr, a, b) {
  let t = arr[a];
  arr[a] = arr[b];
  arr[b] = t;
}
</script>

</body>
